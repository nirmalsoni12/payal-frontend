<!DOCTYPE html>
<html>
<head>
<title>Jewellery Search 🔥</title>
<style>
body { background:#0f172a; color:white; text-align:center; font-family:Arial; }
.box { margin-top:50px; background:#1e293b; padding:20px; border-radius:15px; width:300px; margin:auto;}
button { background:#22c55e; border:none; padding:10px; color:white; border-radius:8px;}
</style>
</head>

<body>

<div class="box">
<h2>Add Item (Admin)</h2>

<input type="file" id="file"><br><br>
<input type="text" id="tag" placeholder="Tag No"><br><br>
<input type="text" id="name" placeholder="Item Name"><br><br>
<input type="number" id="qty" placeholder="Quantity"><br><br>

<button onclick="addItem()">Add Item</button>

<hr>

<h2>Search</h2>
<input type="file" id="searchFile"><br><br>
<button onclick="search()">Search</button>

<p id="result"></p>
</div>

<script>
const API = "https://payal-backend.onrender.com";

async function addItem() {
    let file = document.getElementById("file").files[0];
    let tag = document.getElementById("tag").value;
    let name = document.getElementById("name").value;
    let qty = document.getElementById("qty").value;

    let form = new FormData();
    form.append("file", file);
    form.append("tag_no", tag);
    form.append("name", name);
    form.append("quantity", qty);

    let res = await fetch(API + "/add-item", {
        method: "POST",
        body: form
    });

    let data = await res.json();
    alert("Item Added ✅");
}

async function search() {
    let file = document.getElementById("searchFile").files[0];

    let form = new FormData();
    form.append("file", file);

    let res = await fetch(API + "/search", {
        method: "POST",
        body: form
    });

    let data = await res.json();

    if (data.error) {
        document.getElementById("result").innerText = data.error;
        return;
    }

    let item = data.match;

    document.getElementById("result").innerText =
        "🔖 Tag: " + item.tag_no +
        "\n📦 Qty: " + item.quantity +
        "\n🧠 Name: " + item.name;
}
</script>

</body>
</html>
