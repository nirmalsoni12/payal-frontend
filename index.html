<!DOCTYPE html>
<html>
<head>
<title>Jewellery System - Phase 11</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#0f172a; color:white; text-align:center; font-family:sans-serif; }
.card { background:#1e293b; padding:20px; margin:20px auto; width:320px; border-radius:15px; }
button { background:#22c55e; padding:10px; border:none; color:white; border-radius:8px; cursor:pointer; }
#reader { width:260px; margin:auto; }
</style>
</head>

<body>

<!-- ADD ITEM -->
<div class="card">
<h2>➕ Add Item</h2>

<input type="file" id="file"><br><br>
<input type="text" id="name" placeholder="Item Name"><br><br>

<button onclick="checkItem()">Check & Add</button>
</div>

<!-- SEARCH -->
<div class="card">
<h2>🔍 Search Item</h2>

<input type="file" id="searchFile"><br><br>
<button onclick="search()">Search</button>

<p id="result"></p>
</div>

<!-- CAMERA SCAN SELL -->
<div class="card">
<h2>📷 Scan & Sell</h2>

<div id="reader"></div>
<br>

<input type="text" id="sellTag" placeholder="Or Enter Tag"><br><br>
<button onclick="sell()">Sell Manual</button>

<p id="sellResult"></p>
</div>

<script>
const API = "https://YOUR-BACKEND.onrender.com"; // ⚠️ change

// ---------------- ADD FLOW ----------------
async function checkItem() {
    let form = new FormData();
    form.append("file", file.files[0]);

    let res = await fetch(API + "/check-item", {
        method:"POST",
        body:form
    });

    let data = await res.json();

    if (data.exists) {
        alert("⚠️ Item already exists!\nQty: " + data.item.quantity);
        return;
    }

    let qty = prompt("Enter quantity:");
    let codes = [];

    for(let i=0;i<qty;i++){
        let c = prompt("Scan barcode " + (i+1));
        codes.push(c);
    }

    let form2 = new FormData();
    form2.append("file", file.files[0]);
    form2.append("name", name.value);
    form2.append("quantity", qty);
    form2.append("barcodes", codes.join(","));

    await fetch(API + "/add-item", {
        method:"POST",
        body:form2
    });

    alert("✅ Item Added");
}

// ---------------- SEARCH ----------------
async function search(){
    let form = new FormData();
    form.append("file", searchFile.files[0]);

    let res = await fetch(API + "/search", {
        method:"POST",
        body:form
    });

    let data = await res.json();

    if(data.error){
        result.innerText = data.error;
        return;
    }

    result.innerText =
        "🔖 Name: " + data.match.name +
        "\n📦 Qty: " + data.match.quantity +
        "\n📊 Similarity: " + data.similarity;
}

// ---------------- SELL (API) ----------------
async function sell(tagInput){
    let tag = tagInput || sellTag.value;

    if(!tag){
        alert("Scan or enter tag");
        return;
    }

    let form = new FormData();
    form.append("tag_no", tag);

    let res = await fetch(API + "/sell-item", {
        method:"POST",
        body:form
    });

    let data = await res.json();

    sellResult.innerText =
        data.msg ? 
        "✅ Sold | Remaining: " + data.remaining :
        "❌ " + data.error;
}

// ---------------- CAMERA SCANNER ----------------
function onScanSuccess(decodedText) {
    console.log("Scanned:", decodedText);

    // fill input
    document.getElementById("sellTag").value = decodedText;

    // auto sell
    sell(decodedText);
}

function startScanner() {
    const scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 200 },
        onScanSuccess,
        (err) => {}
    );
}

// start camera
startScanner();

</script>

</body>
</html>
