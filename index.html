<!DOCTYPE html>
<html>
<head>
<title>Phase 12 Jewellery System</title>

<style>
body { background:#0f172a; color:white; text-align:center; font-family:sans-serif; }
.card { background:#1e293b; padding:20px; margin:20px auto; width:320px; border-radius:15px; }
button { background:#22c55e; padding:10px; border:none; color:white; border-radius:8px; }
</style>
</head>

<body>

<div class="card">
<h2>📦 Bulk Add</h2>

<input type="file" id="file"><br><br>
<input type="text" id="name" placeholder="Item Name"><br><br>
<input type="number" id="qty" placeholder="Quantity"><br><br>

<button onclick="startBulk()">Start Add</button>

<p id="status"></p>
</div>

<div class="card">
<h2>🔍 Search</h2>
<input type="file" id="searchFile"><br><br>
<button onclick="search()">Search</button>
<p id="result"></p>
</div>

<div class="card">
<h2>💰 Sell</h2>
<input type="text" id="sellTag" placeholder="Scan Tag"><br><br>
<button onclick="sell()">Sell</button>
<p id="sellResult"></p>
</div>

<script>
const API = "https://YOUR-BACKEND.onrender.com";

// ---------------- BULK ADD ----------------
async function startBulk(){
    let file = document.getElementById("file").files[0];
    let name = document.getElementById("name").value;
    let qty = parseInt(document.getElementById("qty").value);

    if(!file || !qty){
        alert("Fill all fields");
        return;
    }

    let codes=[];

    for(let i=0;i<qty;i++){
        let code = prompt("Scan barcode "+(i+1));
        if(!code){ i--; continue; }
        codes.push(code);
    }

    let form=new FormData();
    form.append("file",file);
    form.append("name",name);
    form.append("quantity",qty);
    form.append("barcodes",codes.join(","));

    let res=await fetch(API+"/add-bulk",{method:"POST",body:form});
    let data=await res.json();

    status.innerText = data.msg + " | " + data.design_id;
}

// ---------------- SEARCH ----------------
async function search(){
    let form=new FormData();
    form.append("file",searchFile.files[0]);

    let res=await fetch(API+"/search",{method:"POST",body:form});
    let data=await res.json();

    result.innerText =
        "Design: "+data.design+
        "\nName: "+data.name+
        "\nQty: "+data.qty+
        "\nSimilarity: "+data.similarity;
}

// ---------------- SELL ----------------
async function sell(){
    let form=new FormData();
    form.append("tag_no",sellTag.value);

    let res=await fetch(API+"/sell-item",{method:"POST",body:form});
    let data=await res.json();

    sellResult.innerText =
        data.msg ? data.remaining : data.error;
}
</script>

</body>
</html>
