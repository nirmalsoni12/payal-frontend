<!DOCTYPE html>
<html>
<head>
<title>Phase 13 Jewellery System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#0f172a; color:white; text-align:center; }
.card { background:#1e293b; padding:20px; margin:20px auto; width:320px; border-radius:15px; }
button { background:#22c55e; padding:10px; border:none; color:white; }
</style>
</head>

<body>

<div class="card">
<h2>📦 Bulk Add</h2>

<input type="file" id="file"><br><br>
<input type="text" id="name" placeholder="Name"><br><br>
<input type="number" id="qty" placeholder="Qty"><br><br>

<button onclick="startBulk()">Start</button>
</div>

<div class="card">
<h2>📷 Scan Barcode (Camera)</h2>
<div id="reader" style="width:250px;"></div>
</div>

<div class="card">
<h2>🖼 Scan From Photo</h2>
<input type="file" id="photo"><br><br>
<button onclick="scanPhoto()">Scan Photo</button>
<p id="photoResult"></p>
</div>

<script>
const API = "https://YOUR-BACKEND.onrender.com";

// ---------------- BULK ADD ----------------
async function startBulk(){
    let file = document.getElementById("file").files[0];
    let name = document.getElementById("name").value;
    let qty = parseInt(document.getElementById("qty").value);

    let codes=[];
    let weightData={};

    for(let i=0;i<qty;i++){
        let code = prompt("Scan barcode "+(i+1));

        let gross = prompt("Gross weight");
        let net = prompt("Net weight");
        let less = prompt("Less weight");

        codes.push(code);

        weightData[code] = {
            name:name,
            gross:gross,
            net:net,
            less:less
        };
    }

    let form=new FormData();
    form.append("file",file);
    form.append("name",name);
    form.append("quantity",qty);
    form.append("barcodes",codes.join(","));
    form.append("weights",JSON.stringify(weightData));

    await fetch(API+"/add-bulk",{method:"POST",body:form});

    alert("Added ✅");
}

// ---------------- CAMERA SCAN ----------------
function startCamera(){
    const scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:200 },
        async (text)=>{

            let res = await fetch(API+"/get-barcode-info?code="+text);
            let data = await res.json();

            if(data.found){
                alert(
                    "Name: "+data.data.name+
                    "\nGross: "+data.data.gross
                );
            }
        },
        ()=>{}
    );
}
startCamera();

// ---------------- PHOTO SCAN ----------------
async function scanPhoto(){
    let file = document.getElementById("photo").files[0];

    const scanner = new Html5Qrcode("reader");

    try{
        let result = await scanner.scanFile(file,true);

        let res = await fetch(API+"/get-barcode-info?code="+result);
        let data = await res.json();

        photoResult.innerText =
            data.found ?
            "Name: "+data.data.name+"\nGross:"+data.data.gross :
            "Not found";

    }catch(e){
        alert("No barcode found");
    }
}
</script>

</body>
</html>
