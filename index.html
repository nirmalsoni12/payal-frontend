<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Image Search 🔥</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.box {
    margin-top: 80px;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    margin-left: auto;
    margin-right: auto;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>AI Image Search 🔥</h2>

<input type="file" id="file"><br><br>
<img id="preview" width="200"><br><br>

<button onclick="upload()">Upload</button>

<p id="result"></p>
</div>

<script>
const API = "https://payal-backend.onrender.com"; // apna backend

document.getElementById("file").onchange = function(e){
    let file = e.target.files[0];
    document.getElementById("preview").src = URL.createObjectURL(file);
};

async function upload() {
    let file = document.getElementById("file").files[0];

    if (!file) {
        alert("File select kar");
        return;
    }

    let form = new FormData();
    form.append("file", file);

    document.getElementById("result").innerText = "⏳ Uploading...";

    try {
        let res = await fetch(API + "/search", {
            method: "POST",
            body: form
        });

        let data = await res.json();

        if (data.error) {
            document.getElementById("result").innerText = "❌ " + data.error;
            return;
        }

        let top = data.result[0];

        document.getElementById("result").innerText =
            "🧠 Prediction: " + top.label + " (" + top.score + ")";
    }
    catch (err) {
        document.getElementById("result").innerText = "❌ Error: " + err.message;
    }
}
</script>

</body>
</html>
