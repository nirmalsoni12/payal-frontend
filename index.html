<!DOCTYPE html>
<html>
<head>
<title>Jewellery System</title>

<style>
body { background:#0f172a; color:white; text-align:center; }
.card { background:#1e293b; padding:20px; margin:20px auto; width:300px; border-radius:15px; }
button { background:#22c55e; padding:10px; border:none; color:white; }
</style>
</head>

<body>

<div class="card">
<h2>Add Item</h2>
<input type="file" id="file"><br><br>
<input type="text" id="name" placeholder="Name"><br><br>
<button onclick="checkItem()">Check & Add</button>
</div>

<div class="card">
<h2>Search</h2>
<input type="file" id="searchFile"><br><br>
<button onclick="search()">Search</button>
<p id="result"></p>
</div>

<div class="card">
<h2>Sell</h2>
<input type="text" id="sellTag" placeholder="Scan Tag"><br><br>
<button onclick="sell()">Sell</button>
<p id="sellResult"></p>
</div>

<script>
const API = "https://YOUR-BACKEND.onrender.com";

async function checkItem() {
    let form = new FormData();
    form.append("file", file.files[0]);

    let res = await fetch(API + "/check-item", { method:"POST", body:form });
    let data = await res.json();

    if (data.exists) {
        alert("Already exists!\nQty: " + data.item.quantity);
        return;
    }

    let qty = prompt("Enter quantity:");
    let codes = [];

    for(let i=0;i<qty;i++){
        let c = prompt("Scan barcode " + (i+1));
        codes.push(c);
    }

    let form2 = new FormData();
    form2.append("file", file.files[0]);
    form2.append("name", name.value);
    form2.append("quantity", qty);
    form2.append("barcodes", codes.join(","));

    await fetch(API + "/add-item", { method:"POST", body:form2 });

    alert("Added ✅");
}

async function search(){
    let form = new FormData();
    form.append("file", searchFile.files[0]);

    let res = await fetch(API + "/search", { method:"POST", body:form });
    let data = await res.json();

    result.innerText =
      "Name: " + data.match.name +
      "\nQty: " + data.match.quantity +
      "\nSimilarity: " + data.similarity;
}

async function sell(){
    let form = new FormData();
    form.append("tag_no", sellTag.value);

    let res = await fetch(API + "/sell-item", { method:"POST", body:form });
    let data = await res.json();

    sellResult.innerText = data.msg ? data.remaining : data.error;
}
</script>

</body>
</html>
