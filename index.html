<!DOCTYPE html>
<html>
<head>
<title>AI Image Search 🔥</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

.box {
    margin-top: 50px;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    margin-left: auto;
    margin-right: auto;
    background: #1e293b;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:disabled {
    background: gray;
}

img {
    margin-top: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="box">
<h2>AI Image Search 🔥</h2>

<input type="file" id="file"><br><br>

<img id="preview" width="200"/><br>

<button id="btn" onclick="upload()">Upload</button>

<p id="result"></p>
</div>

<script>

const API = "https://payal-backend.onrender.com/";

document.getElementById("file").onchange = function(e){
    let file = e.target.files[0];
    if(file){
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
}

async function upload() {
  let file = document.getElementById("file").files[0];

  let form = new FormData();
  form.append("file", file);

  try {
    let res = await fetch(API + "/search", {
      method: "POST",
      body: form,
    });

    console.log("STATUS:", res.status);   
    let text = await res.text();         
    console.log("RESPONSE:", text);       

    let data = JSON.parse(text);

    document.getElementById("result").innerText =
      "Prediction: " + data.result[0].label;

  } catch (err) {
    console.error("FETCH ERROR:", err);   
    document.getElementById("result").innerText =
      "Error: " + err.message;
  }
}

</script>

</body>
</html>
