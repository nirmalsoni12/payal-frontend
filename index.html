<!DOCTYPE html>
<html>
<head>
<title>AI Image Search 🔥</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

.box {
    margin-top: 50px;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    margin-left: auto;
    margin-right: auto;
    background: #1e293b;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:disabled {
    background: gray;
}

img {
    margin-top: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="box">
<h2>AI Image Search 🔥</h2>

<input type="file" id="file"><br><br>

<img id="preview" width="200"/><br>

<button id="btn" onclick="upload()">Upload</button>

<p id="result"></p>
</div>


<script>
const API = "https://payal-backend.onrender.com";

async function upload() {
  let file = document.getElementById("file").files[0];

  if (!file) {
    alert("File select kar");
    return;
  }

  let form = new FormData();
  form.append("file", file);

  document.getElementById("result").innerText = "⏳ Uploading...";

  try {
    let res = await fetch(API + "/search", {
      method: "POST",
      body: form
    });

    let text = await res.text();
    let data;

    try {
      data = JSON.parse(text);
      } 
    catch {
      document.getElementById("result").innerText = "❌ Server Error: " + text;
      return;
  }

    // 🔥 SAFE CHECK
    if (!data.result) {
      document.getElementById("result").innerText =
        "❌ API Error: " + (data.error || "No result");
      return;
    }

    let top = data.result[0];

    document.getElementById("result").innerText =
      "🧠 Prediction: " + top.label;

  } catch (err) {
    document.getElementById("result").innerText =
      "❌ Error: " + err.message;
  }
}

</script>
</body>
</html>
