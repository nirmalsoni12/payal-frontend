<!DOCTYPE html>
<html>
<head>
<title>AI Jewellery Search 🔥</title>

<style>
body {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  font-family: sans-serif;
  text-align: center;
}

.container {
  margin-top: 50px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  width: 320px;
  margin: auto;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

img {
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🛒 Add Item</h2>

<input type="file" id="file"><br><br>
<input type="text" id="tag" placeholder="Tag"><br><br>
<input type="text" id="name" placeholder="Name"><br><br>
<input type="number" id="qty" placeholder="Qty"><br><br>

<button onclick="addItem()">Add</button>
</div>

<br>

<div class="card">
<h2>🔍 Search Item</h2>

<input type="file" id="searchFile"><br><br>
<img id="preview" width="200"><br><br>

<button onclick="search()">Search</button>

<p id="result"></p>
</div>

</div>

<script>
const API = "https://payal-backend.onrender.com";

document.getElementById("searchFile").onchange = e => {
    let file = e.target.files[0];
    document.getElementById("preview").src = URL.createObjectURL(file);
};

async function addItem() {
    let form = new FormData();
    form.append("file", file.files[0]);
    form.append("tag_no", tag.value);
    form.append("name", name.value);
    form.append("quantity", qty.value);

    await fetch(API + "/add-item", { method: "POST", body: form });

    alert("Added ✅");
}

async function search() {
    let form = new FormData();
    form.append("file", searchFile.files[0]);

    let res = await fetch(API + "/search", {
        method: "POST",
        body: form
    });

    let data = await res.json();

    result.innerText =
      "🔖 Tag: " + data.match.tag_no +
      "\n📦 Qty: " + data.match.quantity +
      "\n🧠 Name: " + data.match.name +
      "\n📊 Similarity: " + data.similarity;
}
</script>

</body>
</html>
